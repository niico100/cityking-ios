workflows:
  cityking-ios-testflight:
    name: CityKing iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_BUNDLE_ID: com.cityking.app
        APP_STORE_APPLE_ID: "6775212148"
      groups:
        - app_store_connect

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Verify CityKing iOS icon
        script: test -f ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch iOS signing files
        script: |
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Missing APP_STORE_CONNECT_KEY_IDENTIFIER}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Missing APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Missing APP_STORE_CONNECT_PRIVATE_KEY}"
          : "${CERTIFICATE_PRIVATE_KEY:?Missing CERTIFICATE_PRIVATE_KEY}"
          app-store-connect fetch-signing-files "$APP_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Set up signing certificate
        script: keychain add-certificates

      - name: Configure code signing in Xcode project
        script: xcode-project use-profiles

      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number="${BUILD_NUMBER:-1}" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
